name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: Run the staging release pipeline without publishing production releases
        required: false
        type: boolean
        default: true

permissions:
  contents: read

env:
  JUSTFILE: ${{ github.workspace }}/pipeline.just

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify-tag:
    name: Resolve release context
    runs-on: ubuntu-22.04
    outputs:
      base_version: ${{ steps.resolve-context.outputs.base_version }}
      pit_go_ref: ${{ steps.resolve-context.outputs.pit_go_ref }}
      release_mode: ${{ steps.resolve-context.outputs.release_mode }}
      version: ${{ steps.resolve-context.outputs.version }}
    steps:
      - name: Checkout tags
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup just
        uses: extractions/setup-just@v3

      - name: Resolve release mode and version
        id: resolve-context
        shell: bash
        env:
          DRY_RUN_INPUT: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          set -euo pipefail

          BASE_VERSION="$(grep -m1 '^version\s*=' crates/openpit/Cargo.toml | sed 's/^version[[:space:]]*=[[:space:]]*"\([^"]*\)".*/\1/')"
          SHORT_SHA="$(git rev-parse --short=12 HEAD)"

          case "${GITHUB_EVENT_NAME}" in
            push)
              if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
                echo "::error::Tag ${GITHUB_REF_NAME} does not match required format vMAJOR.MINOR.PATCH"
                exit 1
              fi
              RELEASE_MODE="production"
              VERSION="${GITHUB_REF#refs/tags/v}"
              PIT_GO_REF="main"
              ;;
            workflow_dispatch)
              if [[ "${GITHUB_REF_NAME}" != "release-dry-run" ]]; then
                echo "::error::workflow_dispatch release dry-run is only allowed from branch release-dry-run"
                exit 1
              fi
              if [[ "${DRY_RUN_INPUT}" != "true" ]]; then
                echo "::error::workflow_dispatch runs must set dry_run=true"
                exit 1
              fi
              RELEASE_MODE="dry-run"
              VERSION="${BASE_VERSION}-alpha.${GITHUB_RUN_NUMBER}"
              PIT_GO_REF="release-dry-run/${BASE_VERSION}-${SHORT_SHA}"
              ;;
            *)
              echo "::error::Unsupported event ${GITHUB_EVENT_NAME}"
              exit 1
              ;;
          esac

          echo "base_version=${BASE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "pit_go_ref=${PIT_GO_REF}" >> "$GITHUB_OUTPUT"
          echo "release_mode=${RELEASE_MODE}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved ${RELEASE_MODE} version: ${VERSION}"

      - name: Verify Cargo.toml versions match tag
        if: ${{ steps.resolve-context.outputs.release_mode == 'production' }}
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF#refs/tags/v}"
          just --justfile "$JUSTFILE" check-cargo-versions "$VERSION"

      - name: Validate monotonic version bump
        if: ${{ steps.resolve-context.outputs.release_mode == 'production' }}
        shell: bash
        run: just --justfile "$JUSTFILE" check-version-bump "$GITHUB_REF_NAME"

  verify:
    name: Verify (Rust + Python)
    needs: verify-tag
    uses: ./.github/workflows/verify.yml

  publish-rust:
    name: Publish Rust crate
    needs:
      - verify
      - verify-tag
      - publish-wheels
      - publish-sdist
      - build-runtime-artifacts
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup just
        uses: extractions/setup-just@v3

      - name: Load CI versions
        shell: bash
        run: cat "$GITHUB_WORKSPACE/.github/ci-versions.env" >> "$GITHUB_ENV"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.CI_RUST }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Ensure crates.io versions are not published
        if: ${{ needs.verify-tag.outputs.release_mode == 'production' }}
        shell: bash
        env:
          VERSION: ${{ needs.verify-tag.outputs.version }}
        run: just --justfile "$JUSTFILE" check-crate-unpublished "$VERSION"

      - name: Publish or dry-run crates
        shell: bash
        env:
          CRATES_IO_TOKEN: ${{ secrets.CRATES_IO_API_TOKEN }}
          RELEASE_MODE: ${{ needs.verify-tag.outputs.release_mode }}
        run: |
          set -euo pipefail
          if [[ "${RELEASE_MODE}" == "dry-run" ]]; then
            cargo publish -p openpit-derive --dry-run --locked
            cargo publish -p openpit --dry-run --locked
          else
            if [[ -z "${CRATES_IO_TOKEN}" ]]; then
              echo "::error::CRATES_IO_API_TOKEN is required for production releases"
              exit 1
            fi
            cargo publish -p openpit-derive --locked --token "${CRATES_IO_TOKEN}"
            cargo publish -p openpit --locked --token "${CRATES_IO_TOKEN}"
          fi

  publish-wheels:
    name: Publish wheels (${{ matrix.name }})
    needs:
      - verify
      - verify-tag
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64-manylinux2014
            os: ubuntu-22.04 # Using as lowest Python version is 3.10 and 22 has it
            target: x86_64-unknown-linux-gnu
            manylinux: manylinux2014
          - name: linux-aarch64-manylinux2014
            os: ubuntu-22.04 # Using as lowest Python version is 3.10 and 22 has it
            target: aarch64-unknown-linux-gnu
            manylinux: manylinux2014
          - name: linux-x86_64-musllinux_1_2
            os: ubuntu-22.04 # Using as lowest Python version is 3.10 and 22 has it
            target: x86_64-unknown-linux-musl
            manylinux: musllinux_1_2
          - name: windows-x86_64
            os: windows-2022
            target: x86_64-pc-windows-msvc
          - name: macos-x86_64
            os: macos-15-intel
            target: x86_64-apple-darwin
          - name: macos-aarch64
            os: macos-14
            target: aarch64-apple-darwin
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup just
        uses: extractions/setup-just@v3

      - name: Load CI versions
        shell: bash
        run: cat "$GITHUB_WORKSPACE/.github/ci-versions.env" >> "$GITHUB_ENV"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.CI_RUST }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.CI_PYTHON }}

      - name: Create virtual environment
        shell: bash
        run: |
          set -euo pipefail
          python -m venv .venv
          if [[ "${RUNNER_OS}" == "Windows" ]]; then
            venv_path="$(cygpath -m "$PWD/.venv")"
            python_path="$(cygpath -m "$PWD/.venv/Scripts/python.exe")"
            python_bin="$(cygpath -m "$PWD/.venv/Scripts")"
          else
            venv_path="$PWD/.venv"
            python_path="$PWD/.venv/bin/python"
            python_bin="$PWD/.venv/bin"
          fi
          echo "VIRTUAL_ENV=$venv_path" >> "$GITHUB_ENV"
          echo "PYTHON_PATH=$python_path" >> "$GITHUB_ENV"
          echo "PYO3_PYTHON=$python_path" >> "$GITHUB_ENV"
          echo "$python_bin" >> "$GITHUB_PATH"

      - name: Install Python test dependencies
        shell: bash
        run: |
          "$PYTHON_PATH" -m pip install --upgrade pip
          "$PYTHON_PATH" -m pip install -r requirements.txt
          "$PYTHON_PATH" -m pip install twine

      - name: Apply staging Python package version
        if: ${{ needs.verify-tag.outputs.release_mode == 'dry-run' }}
        shell: bash
        env:
          STAGING_VERSION: ${{ needs.verify-tag.outputs.version }}
        run: just --justfile "$JUSTFILE" apply-staging-version "$STAGING_VERSION"

      - name: Copy monorepo LICENSE and OWNERS into Python package
        shell: bash
        run: just --justfile "$JUSTFILE" copy-python-metadata

      - name: Use static MSVC CRT for Windows wheel
        if: matrix.target == 'x86_64-pc-windows-msvc'
        shell: bash
        run: echo "RUSTFLAGS=-C target-feature=+crt-static" >> "$GITHUB_ENV"

      - name: Build Linux wheel
        if: startsWith(matrix.os, 'ubuntu')
        uses: PyO3/maturin-action@v1
        with:
          working-directory: bindings/python
          command: build
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          container: off
          args: --release --strip --zig -i python${{ env.CI_PYTHON }} --out dist

      - name: Build macOS/Windows wheel
        if: ${{ !startsWith(matrix.os, 'ubuntu') }}
        uses: PyO3/maturin-action@v1
        with:
          working-directory: bindings/python
          command: build
          target: ${{ matrix.target }}
          args: --release --strip -i python${{ env.CI_PYTHON }} --out dist

      - name: Resolve built wheel path
        shell: bash
        env:
          VERSION: ${{ needs.verify-tag.outputs.version }}
        run: |
          set -euo pipefail
          WHEEL_PATH="$(just --justfile "$JUSTFILE" resolve-wheel "$VERSION")"
          echo "WHEEL_PATH=${WHEEL_PATH}" >> "$GITHUB_ENV"

      - name: Install built wheel
        if: matrix.name == 'linux-x86_64-manylinux2014' || !startsWith(matrix.os, 'ubuntu')
        shell: bash
        run: |
          "$PYTHON_PATH" -m pip install --force-reinstall --no-deps "${{ env.WHEEL_PATH }}"

      - name: Verify wheel import and version
        if: matrix.name == 'linux-x86_64-manylinux2014' || !startsWith(matrix.os, 'ubuntu')
        shell: bash
        env:
          BASE_VERSION: ${{ needs.verify-tag.outputs.base_version }}
          RELEASE_MODE: ${{ needs.verify-tag.outputs.release_mode }}
          VERSION: ${{ needs.verify-tag.outputs.version }}
        run: just --justfile "$JUSTFILE" verify-wheel-version "$RELEASE_MODE" "$VERSION" "$BASE_VERSION"

      - name: Run wheel tests
        if: matrix.name == 'linux-x86_64-manylinux2014' || !startsWith(matrix.os, 'ubuntu')
        shell: bash
        run: just --justfile "$JUSTFILE" test-wheel

      - name: Validate wheel metadata
        shell: bash
        run: just --justfile "$JUSTFILE" check-wheel "$WHEEL_PATH"

      - name: Upload wheel artifact
        if: ${{ needs.verify-tag.outputs.release_mode == 'dry-run' }}
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.name }}
          path: ${{ env.WHEEL_PATH }}
          if-no-files-found: error
          retention-days: 1

      - name: Publish wheel
        shell: bash
        env:
          PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
          RELEASE_MODE: ${{ needs.verify-tag.outputs.release_mode }}
        run: |
          set -euo pipefail
          if [[ "${RELEASE_MODE}" == "dry-run" ]]; then
            echo "Skipping TestPyPI wheel upload in dry-run mode"
          else
            if [[ -z "${PYPI_TOKEN}" ]]; then
              echo "::error::PYPI_API_TOKEN is required for production wheel uploads"
              exit 1
            fi
            TWINE_USERNAME=__token__ TWINE_PASSWORD="${PYPI_TOKEN}" \
              twine upload --skip-existing --non-interactive "${WHEEL_PATH}"
          fi

  publish-sdist:
    name: Publish source distribution
    needs:
      - publish-wheels
      - verify-tag
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup just
        uses: extractions/setup-just@v3

      - name: Load CI versions
        shell: bash
        run: cat "$GITHUB_WORKSPACE/.github/ci-versions.env" >> "$GITHUB_ENV"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.CI_RUST }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.CI_PYTHON }}

      - name: Create virtual environment
        shell: bash
        run: |
          python -m venv .venv
          echo "VIRTUAL_ENV=$GITHUB_WORKSPACE/.venv" >> "$GITHUB_ENV"
          echo "PYTHON_PATH=$GITHUB_WORKSPACE/.venv/bin/python" >> "$GITHUB_ENV"
          echo "PYO3_PYTHON=$GITHUB_WORKSPACE/.venv/bin/python" >> "$GITHUB_ENV"
          echo "$GITHUB_WORKSPACE/.venv/bin" >> "$GITHUB_PATH"

      - name: Install requirements
        shell: bash
        run: |
          "$PYTHON_PATH" -m pip install --upgrade pip
          "$PYTHON_PATH" -m pip install -r requirements.txt
          "$PYTHON_PATH" -m pip install twine

      - name: Apply staging Python package version
        if: ${{ needs.verify-tag.outputs.release_mode == 'dry-run' }}
        shell: bash
        env:
          STAGING_VERSION: ${{ needs.verify-tag.outputs.version }}
        run: just --justfile "$JUSTFILE" apply-staging-version "$STAGING_VERSION"

      - name: Copy monorepo LICENSE and OWNERS into Python package
        shell: bash
        run: just --justfile "$JUSTFILE" copy-python-metadata

      - name: Build sdist
        shell: bash
        run: just --justfile "$JUSTFILE" build-sdist

      - name: Validate sdist license files
        shell: bash
        run: just --justfile "$JUSTFILE" validate-sdist-license

      - name: Validate sdist metadata
        shell: bash
        run: just --justfile "$JUSTFILE" check-sdist

      - name: Smoke-test sdist install
        shell: bash
        env:
          BASE_VERSION: ${{ needs.verify-tag.outputs.base_version }}
          RELEASE_MODE: ${{ needs.verify-tag.outputs.release_mode }}
          VERSION: ${{ needs.verify-tag.outputs.version }}
        run: just --justfile "$JUSTFILE" smoke-sdist "$RELEASE_MODE" "$VERSION" "$BASE_VERSION"

      - name: Upload sdist artifact
        if: ${{ needs.verify-tag.outputs.release_mode == 'dry-run' }}
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*
          if-no-files-found: error
          retention-days: 1

      - name: Publish sdist
        shell: bash
        env:
          PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
          RELEASE_MODE: ${{ needs.verify-tag.outputs.release_mode }}
        run: |
          set -euo pipefail
          if [[ "${RELEASE_MODE}" == "dry-run" ]]; then
            echo "Skipping TestPyPI sdist upload in dry-run mode"
          else
            if [[ -z "${PYPI_TOKEN}" ]]; then
              echo "::error::PYPI_API_TOKEN is required for production sdist uploads"
              exit 1
            fi
            TWINE_USERNAME=__token__ TWINE_PASSWORD="${PYPI_TOKEN}" \
              twine upload --skip-existing --non-interactive dist/*
          fi

  build-runtime-artifacts:
    name: Build runtime artifacts (${{ matrix.name }})
    needs:
      - verify
      - verify-tag
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            goos: linux
            goarch: amd64
            lib_name: libopenpit_ffi.so
          - name: linux-arm64
            os: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            goos: linux
            goarch: arm64
            lib_name: libopenpit_ffi.so
          - name: darwin-amd64
            os: macos-15-intel
            target: x86_64-apple-darwin
            goos: darwin
            goarch: amd64
            lib_name: libopenpit_ffi.dylib
          - name: darwin-arm64
            os: macos-14
            target: aarch64-apple-darwin
            goos: darwin
            goarch: arm64
            lib_name: libopenpit_ffi.dylib
          - name: windows-amd64
            os: windows-2022
            target: x86_64-pc-windows-msvc
            goos: windows
            goarch: amd64
            lib_name: openpit_ffi.dll
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup just
        uses: extractions/setup-just@v3

      - name: Load CI versions
        shell: bash
        run: cat "$GITHUB_WORKSPACE/.github/ci-versions.env" >> "$GITHUB_ENV"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.CI_RUST }}
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.CI_PYTHON }}

      - name: Install Linux cross-compiler for arm64
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install --yes gcc-aarch64-linux-gnu

      - name: Build runtime library
        shell: bash
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: just --justfile "$JUSTFILE" build-ffi-target "${{ matrix.target }}"

      - name: Package artifact (unix)
        if: runner.os != 'Windows'
        shell: bash
        env:
          VERSION: ${{ needs.verify-tag.outputs.version }}
        run: just --justfile "$JUSTFILE" package-runtime "${{ matrix.target }}" "${{ matrix.goos }}" "${{ matrix.goarch }}" "${{ matrix.lib_name }}"

      - name: Package artifact (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          VERSION: ${{ needs.verify-tag.outputs.version }}
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          $src = "target/${{ matrix.target }}/release/${{ matrix.lib_name }}"
          $dst = "dist/openpit-ffi--${{ matrix.goos }}-${{ matrix.goarch }}-${{ matrix.lib_name }}"
          Copy-Item $src $dst -Force
          $implibSrc = "$src.lib"
          if (!(Test-Path $implibSrc)) {
            throw "MSVC import library not found at $implibSrc"
          }
          $implibDst = "$dst.lib"
          Copy-Item $implibSrc $implibDst -Force
          Copy-Item bindings/c/openpit.h dist/openpit.h -Force
          Copy-Item LICENSE dist/LICENSE -Force
          Copy-Item OWNERS dist/OWNERS -Force
          $hash = (Get-FileHash -Path $dst -Algorithm SHA256).Hash.ToLower()
          Set-Content -Path "$dst.sha256" -Value $hash
          $implibHash = (Get-FileHash -Path $implibDst -Algorithm SHA256).Hash.ToLower()
          Set-Content -Path "$implibDst.sha256" -Value $implibHash

      - name: Upload runtime artifacts
        if: ${{ needs.verify-tag.outputs.release_mode == 'production' }}
        uses: actions/upload-artifact@v4
        with:
          name: runtime-${{ matrix.name }}
          path: dist/*
          if-no-files-found: error

      - name: Upload runtime artifacts (dry-run)
        if: ${{ needs.verify-tag.outputs.release_mode == 'dry-run' }}
        uses: actions/upload-artifact@v4
        with:
          name: runtime-${{ matrix.name }}
          path: dist/*
          if-no-files-found: error
          retention-days: 1

  build-cpp-distributable:
    name: Build C++ distributable
    needs:
      - verify
      - verify-tag
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load CI versions
        shell: bash
        run: cat "$GITHUB_WORKSPACE/.github/ci-versions.env" >> "$GITHUB_ENV"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.CI_RUST }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: "3.28"

      - name: Setup just
        uses: extractions/setup-just@v3

      - name: Build C++ binding
        shell: bash
        run: just build-cpp

      - name: Install C++ binding into staging prefix
        shell: bash
        env:
          VERSION: ${{ needs.verify-tag.outputs.version }}
        run: |
          set -euo pipefail
          cmake --install bindings/cpp/build \
            --prefix /tmp/openpit-cpp-install \
            --config Release
          cp LICENSE /tmp/openpit-cpp-install/LICENSE
          cp OWNERS  /tmp/openpit-cpp-install/OWNERS

      - name: Package C++ distributable
        shell: bash
        env:
          VERSION: ${{ needs.verify-tag.outputs.version }}
        run: just --justfile "$JUSTFILE" package-cpp /tmp/openpit-cpp-install

      - name: Upload C++ artifact
        if: ${{ needs.verify-tag.outputs.release_mode == 'production' }}
        uses: actions/upload-artifact@v4
        with:
          name: cpp-distributable
          path: dist/openpit-cpp--*.tar.gz*
          if-no-files-found: error

      - name: Upload C++ artifact (dry-run)
        if: ${{ needs.verify-tag.outputs.release_mode == 'dry-run' }}
        uses: actions/upload-artifact@v4
        with:
          name: cpp-distributable
          path: dist/openpit-cpp--*.tar.gz*
          if-no-files-found: error
          retention-days: 1

  publish-go-sources:
    name: Publish pit-go sources
    needs:
      - publish-rust
      - publish-sdist
      - build-runtime-artifacts
      - build-cpp-distributable
      - verify-tag
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    concurrency:
      group: pit-go-mirror
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Download runtime artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: runtime-*
          path: /tmp/runtime-dl
          merge-multiple: true

      - name: Load CI versions
        shell: bash
        run: cat "$GITHUB_WORKSPACE/.github/ci-versions.env" >> "$GITHUB_ENV"

      - name: Setup just
        uses: extractions/setup-just@v3

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.CI_GO }}

      - name: Split bindings/go and publish release commit to pit-go
        shell: bash
        env:
          PIT_GO_REF: ${{ needs.verify-tag.outputs.pit_go_ref }}
          VERSION: ${{ needs.verify-tag.outputs.version }}
          PIT_GO_PUSH_TOKEN: ${{ secrets.PIT_GO_PUSH_TOKEN }}
          RELEASE_MODE: ${{ needs.verify-tag.outputs.release_mode }}
        run: |
          set -euo pipefail
          if [[ -z "${PIT_GO_PUSH_TOKEN}" ]]; then
            echo "::error::PIT_GO_PUSH_TOKEN secret is required to push to pit-go repository"
            exit 1
          fi

          MONOREPO="${GITHUB_WORKSPACE}"
          WORKTREE="$(mktemp -d)/pit-go-wt"
          PIT_GO_URL="https://x-access-token:${PIT_GO_PUSH_TOKEN}@github.com/openpitkit/pit-go.git"

          # Split preserves Author/Committer of every bindings/go commit up to
          # the release tag. github-actions[bot] is the author only of the
          # follow-up release commit that adds runtime binaries and metadata.
          git subtree split --prefix=bindings/go -b go-split
          git worktree add "${WORKTREE}" go-split

          cp "${MONOREPO}/LICENSE" "${WORKTREE}/LICENSE"
          cp "${MONOREPO}/OWNERS"  "${WORKTREE}/OWNERS"

          declare -A PLATFORMS=(
            ["linux-amd64"]="libopenpit_ffi.so"
            ["linux-arm64"]="libopenpit_ffi.so"
            ["darwin-amd64"]="libopenpit_ffi.dylib"
            ["darwin-arm64"]="libopenpit_ffi.dylib"
            ["windows-amd64"]="openpit_ffi.dll"
          )
          for platform in "${!PLATFORMS[@]}"; do
            lib="${PLATFORMS[$platform]}"
            goos="${platform%-*}"
            goarch="${platform#*-}"
            dir="${WORKTREE}/internal/runtime/${platform}"
            mkdir -p "${dir}"
            cp "/tmp/runtime-dl/openpit-ffi--${goos}-${goarch}-${lib}" "${dir}/${lib}"
          done
          # internal/runtime/.gitignore excludes *.so/*.dylib/*.dll in the
          # monorepo; -f below pierces that ignore inside the mirror only.
          find "${WORKTREE}/internal/runtime" -name .gitkeep -delete

          just --justfile "$JUSTFILE" test-go-split "${WORKTREE}"

          # Remove any injected GitHub Actions auth headers (case variations and scopes)
          unset GITHUB_TOKEN
          git config --global --unset-all "http.https://github.com/.extraheader" || true
          git config --global --unset-all "http.https://github.com/.extraHeader" || true
          git config --unset-all "http.https://github.com/.extraheader" || true
          git config --unset-all "http.https://github.com/.extraHeader" || true

          (
            cd "${WORKTREE}"
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add LICENSE OWNERS
            git add -f internal/runtime/
            git commit -m "Release v${VERSION}: add runtime binaries and monorepo metadata"

            if [[ "${RELEASE_MODE}" == "dry-run" ]]; then
              # Dry-run pushes the full release commit to a disposable branch.
              # No tag is created so dry-run cannot pollute the version space.
              git -c http.extraheader= push --force "${PIT_GO_URL}" "HEAD:${PIT_GO_REF}"
            else
              # main is force-pushed because every release rewrites it to the
              # latest release commit; this is by design for the mirror.
              git -c http.extraheader= push --force "${PIT_GO_URL}" HEAD:main
              # Push the split commit directly to the pit-go tag ref. The
              # monorepo checkout already has v${VERSION}, so creating a local
              # tag here would conflict before the remote repository is checked.
              # Tag push is NOT forced: a conflicting pit-go tag must fail
              # loudly, consistent with crates.io and PyPI semantics. If the
              # tag already points at this exact release commit, continue so a
              # rerun can repair missing GitHub release metadata.
              LOCAL_SHA="$(git rev-parse HEAD)"
              REMOTE_TAG_SHA="$(git -c http.extraheader= ls-remote --tags "${PIT_GO_URL}" "refs/tags/v${VERSION}" | awk '{print $1}')"
              if [[ -z "${REMOTE_TAG_SHA}" ]]; then
                git -c http.extraheader= push "${PIT_GO_URL}" "HEAD:refs/tags/v${VERSION}"
              elif [[ "${REMOTE_TAG_SHA}" != "${LOCAL_SHA}" ]]; then
                echo "::error::pit-go tag v${VERSION} already exists at ${REMOTE_TAG_SHA}, expected ${LOCAL_SHA}"
                exit 1
              else
                echo "pit-go tag v${VERSION} already exists at ${LOCAL_SHA}; continuing"
              fi

              BODY_FILE="$(mktemp)"
              printf '%s\n' \
                "Go SDK source mirror for OpenPit v${VERSION}." \
                "" \
                "Install:" \
                "" \
                '```sh' \
                "go get go.openpit.dev/openpit@v${VERSION}" \
                '```' \
                "" \
                "This release contains the split Go bindings plus the runtime" \
                "binaries embedded under internal/runtime." \
                > "${BODY_FILE}"

              # No --generate-notes: pit-go main is force-pushed every release,
              # so the auto-generated commit summary would be empty or noise.
              if GH_TOKEN="${PIT_GO_PUSH_TOKEN}" gh release view "v${VERSION}" --repo openpitkit/pit-go >/dev/null 2>&1; then
                echo "pit-go release v${VERSION} already exists; leaving it unchanged"
              else
                GH_TOKEN="${PIT_GO_PUSH_TOKEN}" gh release create "v${VERSION}" \
                  --repo openpitkit/pit-go \
                  --title "v${VERSION}" \
                  --notes-file "${BODY_FILE}" \
                  --latest
              fi
            fi
          )

          git worktree remove --force "${WORKTREE}"
          git branch -D go-split

  publish-github-release:
    name: Publish GitHub release metadata
    needs:
      - publish-rust
      - publish-sdist
      - build-runtime-artifacts
      - build-cpp-distributable
      - verify-tag
    if: ${{ needs.verify-tag.outputs.release_mode == 'production' }}
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download runtime artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: runtime-*
          path: release-assets
          merge-multiple: true

      - name: Download C++ distributable artifact
        uses: actions/download-artifact@v4
        with:
          name: cpp-distributable
          path: release-assets

      - name: Create GitHub Release with runtime assets
        shell: bash
        run: |
          set -euo pipefail

          BODY_FILE="$(mktemp)"
          cat <<EOF > "${BODY_FILE}"
          Install from package registries:

          - crates.io: https://crates.io/crates/openpit
          - PyPI: https://pypi.org/project/openpit/${{ needs.verify-tag.outputs.version }}/

          Runtime artifacts for SDK delivery are attached to this release
          (\`.so\`, \`.dylib\`, \`.dll\`, Windows \`.dll.lib\`, and
          \`.sha256\` files per target).

          The C++ distributable (\`openpit-cpp--${{ needs.verify-tag.outputs.version }}.tar.gz\`)
          contains the public headers and CMake config-file package.
          EOF

          mapfile -t ASSETS < <(find release-assets -type f | sort)

          GH_TOKEN="${{ github.token }}" gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            --notes-file "${BODY_FILE}" \
            --latest \
            "${ASSETS[@]}"

  release-e2e-advisory:
    name: Release e2e advisory
    needs:
      - publish-github-release
      - verify-tag
    if: ${{ always() && needs.publish-github-release.result == 'success' }}
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup just
        uses: extractions/setup-just@v3

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Run release e2e
        id: release-e2e
        shell: bash
        run: just --justfile "$JUSTFILE" test-release-e2e "${{ needs.verify-tag.outputs.version }}"

      - name: Summarize release e2e success
        if: ${{ success() }}
        shell: bash
        env:
          VERSION: ${{ needs.verify-tag.outputs.version }}
        run: |
          cat <<EOF >> "$GITHUB_STEP_SUMMARY"
          ## Release e2e

          Release e2e passed for \`openpit ${VERSION}\`.
          EOF

      - name: Open release e2e advisory issue
        if: ${{ failure() }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{
            github.run_id }}
          VERSION: ${{ needs.verify-tag.outputs.version }}
        run: |
          set -euo pipefail

          title="Release e2e failed for openpit ${VERSION}"
          existing="$(
            gh issue list \
              --state open \
              --search "${title} in:title" \
              --json number \
              --jq '.[0].number // empty'
          )"

          if [[ -n "${existing}" ]]; then
            gh issue comment "${existing}" --body "Release e2e failed again for \`openpit ${VERSION}\`: ${RUN_URL}"
            exit 0
          fi

          body_file="$(mktemp)"
          printf '%s\n\n%s\n\n%s\n' \
            "Release e2e failed for \`openpit ${VERSION}\`." \
            "The release has already been published. This issue is advisory and exists so the failure is visible and notifies repository subscribers." \
            "Workflow run: ${RUN_URL}" \
            > "${body_file}"

          gh issue create \
            --title "${title}" \
            --body-file "${body_file}"

      - name: Summarize release e2e advisory failure
        if: ${{ failure() }}
        shell: bash
        env:
          VERSION: ${{ needs.verify-tag.outputs.version }}
        run: |
          echo "::warning::Release e2e failed for openpit ${VERSION}. The release is already published; review the final advisory job logs."
          cat <<EOF >> "$GITHUB_STEP_SUMMARY"
          ## Release e2e advisory

          Release e2e failed for \`openpit ${VERSION}\`.

          The release has already been published. Review the final advisory job logs for details.
          EOF

name: Verify

on:
  pull_request:
  push:
    branches:
      - main
  workflow_call:

permissions:
  contents: read

jobs:
  rust:
    name: Rust checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Lint
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Check docs
        run: RUSTDOCFLAGS="-D warnings" cargo doc --no-deps

      - name: Check default feature set
        run: cargo check --workspace

      - name: Build
        run: cargo build --workspace --all-features

      - name: Test
        run: cargo test --workspace --all-features

  python:
    name: Python bindings verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run Python lint
        run: ruff check .

      - name: Build Python wheel
        run: maturin build --manifest-path bindings/python/Cargo.toml --release --locked --out dist

      - name: Install built wheel
        shell: bash
        run: |
          set -euo pipefail
          python -m pip uninstall -y openpit || true
          WHEEL="$(find dist -maxdepth 1 -type f -name 'openpit-*.whl' | sort | head -n1)"
          test -n "${WHEEL}"
          python -m pip install --force-reinstall --no-deps "${WHEEL}"

      - name: Verify import
        run: python -c "import openpit"

      - name: Verify wheel metadata version
        shell: bash
        run: |
          set -euo pipefail
          WHEEL="$(find dist -maxdepth 1 -type f -name 'openpit-*.whl' | sort | head -n1)"
          EXPECTED="$(basename "${WHEEL}" | sed -E 's/^openpit-([^-]+)-.*/\1/')"
          python -c "import importlib.metadata as m; v=m.version('openpit'); print(v); assert v=='${EXPECTED}', f'expected {EXPECTED}, got {v}'"

      - name: Run Python tests (built wheel)
        run: python -m pytest bindings/python/tests

      - name: Build manylinux2014 wheel
        uses: PyO3/maturin-action@v1
        with:
          working-directory: bindings/python
          command: build
          target: x86_64-unknown-linux-gnu
          manylinux: manylinux2014
          args: --release --strip --locked -i python3.11 --out dist-manylinux

      - name: Install manylinux wheel
        shell: bash
        run: |
          set -euo pipefail
          python -m pip uninstall -y openpit || true
          WHEEL="$(find bindings/python/dist-manylinux -maxdepth 1 -type f -name 'openpit-*.whl' | sort | head -n1)"
          test -n "${WHEEL}"
          python -m pip install --force-reinstall --no-deps "${WHEEL}"

      - name: Verify manylinux import
        run: python -c "import openpit"

      - name: Verify manylinux wheel metadata version
        shell: bash
        run: |
          set -euo pipefail
          WHEEL="$(find bindings/python/dist-manylinux -maxdepth 1 -type f -name 'openpit-*.whl' | sort | head -n1)"
          EXPECTED="$(basename "${WHEEL}" | sed -E 's/^openpit-([^-]+)-.*/\1/')"
          python -c "import importlib.metadata as m; v=m.version('openpit'); print(v); assert v=='${EXPECTED}', f'expected {EXPECTED}, got {v}'"

      - name: Run Python tests (manylinux wheel)
        run: python -m pytest bindings/python/tests

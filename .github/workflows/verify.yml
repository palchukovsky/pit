name: Verify

on:
  pull_request:
  push:
    branches:
      - main
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust checks
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load CI versions
        shell: bash
        run: cat "$GITHUB_WORKSPACE/.github/ci-versions.env" >> "$GITHUB_ENV"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.CI_RUST }}
          components: rustfmt, clippy

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Lint
        run: cargo clippy --workspace --all-targets --no-default-features --locked -- -D warnings

      - name: Lint (all features)
        run: cargo clippy -p openpit --all-targets --all-features --locked -- -D warnings

      - name: Build documentation
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --workspace --no-deps --all-features --locked

      - name: Test
        run: cargo test --workspace --locked

      - name: Test (all features)
        run: cargo test -p openpit --all-features --locked

  python:
    name: Python checks
    runs-on: ubuntu-22.04 # Using as lowest Python version is 3.10 and 22 has it
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.14"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load CI versions
        shell: bash
        run: cat "$GITHUB_WORKSPACE/.github/ci-versions.env" >> "$GITHUB_ENV"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.CI_RUST }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Check Python formatting
        run: python -m black . --check

      - name: Lint Python
        run: python -m ruff check .

      - name: Install Python bindings
        run: pip install bindings/python/

      - name: Run Python bindings Rust tests
        run: cargo test -p openpit-python --locked

      - name: Run Python tests
        run: python -m pytest bindings/python/tests

  c:
    name: C checks
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify C bindings README example
        run: |
          awk 'BEGIN { in_block = 0; first_block = 1 } /^```c$/ { in_block = 1; if (!first_block) print ""; first_block = 0; next } /^```$/ && in_block { in_block = 0; next } in_block { print }' bindings/c/README.md > /tmp/openpit_readme_example.c
          cc -std=c11 -fsyntax-only -I bindings/c /tmp/openpit_readme_example.c

  go:
    name: Go checks
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: bindings/go
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load CI versions
        shell: bash
        run: cat "$GITHUB_WORKSPACE/.github/ci-versions.env" >> "$GITHUB_ENV"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.CI_RUST }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.CI_GO }}

      - name: Build native runtime for Go integration tests
        run: cargo build -p openpit-ffi --release --locked --manifest-path ../../Cargo.toml

      - name: Export runtime library path
        run: |
          echo "OPENPIT_RUNTIME_LIBRARY_PATH=${GITHUB_WORKSPACE}/target/release/libopenpit_ffi.so" >> "$GITHUB_ENV"

      - name: Check formatting
        run: |
          test -z "$(gofmt -l .)"

      - name: Vet
        run: go vet -all ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v${{ env.CI_GOLANGCI_LINT }}
          working-directory: bindings/go
          args: --timeout=5m

      - name: Test
        run: go test ./...

      - name: Test (race)
        run: go test -race ./...

      - name: Check workspace Go examples formatting
        working-directory: examples/go/rate_pnl_killswitch
        run: |
          test -z "$(gofmt -l .)"

      - name: Vet workspace Go examples
        working-directory: examples/go/rate_pnl_killswitch
        run: go vet -all ./...

      - name: Lint workspace Go examples
        uses: golangci/golangci-lint-action@v6
        with:
          version: v${{ env.CI_GOLANGCI_LINT }}
          working-directory: examples/go/rate_pnl_killswitch
          args: --timeout=5m

      - name: Test workspace Go examples
        working-directory: examples/go/rate_pnl_killswitch
        run: go test ./...

      - name: Test workspace Go examples (race)
        working-directory: examples/go/rate_pnl_killswitch
        run: go test -race ./...

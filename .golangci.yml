version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - govet
    - staticcheck
    - errcheck
    - ineffassign
    - unused
    - gosec
    - revive
    - gocritic
    - misspell
    - sqlclosecheck
    - unparam
    - asciicheck
    - bidichk
    - bodyclose
    - copyloopvar
    - prealloc
    - unconvert
    - whitespace
    - errorlint
    - nilerr
    - nilnil
    - nolintlint
    - predeclared
    - mnd

  settings:
    revive:
      confidence: 0.8
      severity: error
      rules:
        - name: var-naming
          arguments:
            - [ "ID", "API", "SDK", "URL", "HTTP", "JSON" ]
            - []
        - name: exported
        - name: package-comments
        - name: error-naming
        - name: error-return
        - name: error-strings
        - name: errorf
        - name: context-as-argument
        - name: receiver-naming
        - name: unexported-naming
        - name: unexported-return
        - name: unused-parameter
        - name: unused-receiver
        - name: unreachable-code
        - name: unnecessary-stmt
        - name: identical-branches
        - name: superfluous-else
        - name: early-return
        - name: indent-error-flow
        - name: range
        - name: range-val-in-closure
        - name: range-val-address
        - name: modifies-parameter
        - name: modifies-value-receiver
        - name: blank-imports
        - name: duplicated-imports
        - name: atomic
        - name: bare-return
        - name: confusing-results
        - name: get-return
        - name: string-of-int
        - name: struct-tag
        - name: time-naming
        - name: var-declaration
        - name: waitgroup-by-value
        - name: unhandled-error
          arguments:
            - fmt.Printf
            - fmt.Println
            - builder.WriteString

    mnd:
      ignored-numbers:
        - "0"
        - "1"
        - "2"
      ignored-functions:
        - "make"
        - "len"
        - "cap"

    nolintlint:
      require-explanation: true
      require-specific: true

  exclusions:
    rules:
      - path: "internal/"
        linters:
          - revive
        text: "should have comment|should have a package comment"

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

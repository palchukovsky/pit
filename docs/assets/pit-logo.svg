<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Pit logo">
  <title>Pit logo</title>
  <defs>
    <linearGradient id="pit-bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#ec963e"/>
      <stop offset="50%"  stop-color="#de7335"/>
      <stop offset="100%" stop-color="#d8542e"/>
    </linearGradient>
    <style>
      .pit-line { stroke: #5a3424; stroke-width: 4; }
      @media (prefers-color-scheme: dark) {
        .pit-line { stroke: #b07a48; stroke-width: 5; }
      }
    </style>
  </defs>
  <g class="pit-line" stroke-dasharray="12 8" fill="none">
    <line x1="128" y1="205" x2="128" y2="436"/>
    <line x1="250" y1="305" x2="250" y2="436"/>
    <line x1="361" y1="225" x2="361" y2="438"/>
    <line x1="448" y1="83"  x2="448" y2="436"/>
  </g>
  <g fill="url(#pit-bar)" stroke="#7d5125" stroke-width="5" stroke-linejoin="round">
    <rect x="55"  y="309" width="190" height="65" rx="2"/>
    <rect x="161" y="230" width="189" height="59" rx="2"/>
    <rect x="277" y="157" width="161" height="57" rx="2"/>
  </g>
</svg>

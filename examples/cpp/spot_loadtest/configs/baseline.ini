; OpenPit spot-limit load test - baseline configuration (Phase 1 skeleton)
; Run with: ./spot_loadtest -config configs/baseline.ini
;
; Phase 1 skeleton: only the [run] section is fully enforced.
; Other sections define the schema for later phases.

[run]
seed        = 0xC0FFEE    ; RNG seed for the deterministic event stream
total_ops   = 2000000     ; operations to execute (exclusive with duration)
window      = 100000      ; sliding-window size
window_unit = ops         ; ops | wall
observer    = on          ; on | off

[arrival]
offered_rate = 50000       ; events/sec

[report_delay]
distribution = lognormal
mean         = 2ms
sigma        = 0.5

[reject]
target_rate = 0.05         ; 5 % reject rate target
tolerance   = 0.005        ; ± 0.5 %

[accounts]
count = 10000              ; total population (most accounts are idle most of the time)

; Bounded-concurrency workload model. Modelling all 10000 accounts as hot at
; once is unrealistic ("a firewall wouldn't even let that through"); instead only
; a bounded ACTIVE WORKING SET is hot at any moment, the rest act rarely, the
; dormant majority almost never. active_accounts caps that working set. 1024 is a
; modest ~10 % of the population — a realistic concurrent-trader count — and it
; bounds the engine's live per-account dispatch queues.
[concurrency]
active_accounts = 1024     ; max accounts concurrently active (must be <= accounts.count)

; Async engine dispatch sizing. These are RESOURCE limits (like a connection cap),
; NOT synchronization semantics: the measured semantics stay per-account AccountSync
; + dynamic per-account dispatch regardless of strategy.
;
; strategy = dynamic (the locked design default): lazy per-account queues with idle
; cleanup. Full per-account isolation and observability. Compared to sharded, it
; has a small RwMutex hit on each submit lookup and a background cleanup goroutine.
;
; strategy = sharded: fixed N-shard dispatch; cheapest hot path, no per-account
; isolation. Use when the active set is broad and balanced and you want minimal
; per-call overhead.
;
; max_queues is left UNLIMITED (0) on the baseline on purpose. The Dynamic
; strategy's idle-cleanup scan is floored at a ~1-minute cadence in the binding,
; so within a sub-minute run idle queues do NOT retire; meanwhile a high offered
; rate touches several thousand DISTINCT accounts in the first second. A finite
; cap below that distinct-touched count would turn ordinary churn into false
; ErrQueueLimit backpressure rather than measure latency. Unlimited keeps the
; baseline crash-free and backpressure-free for any total_ops. A finite cap
; remains a first-class, validated knob (>= active_accounts when nonzero).
;
; idle_cleanup = 5s so the cleanup scan period (idle/5) is ~1s: in a long run,
; queues idle past 5s are retired. Has no effect on a short smoke run.
;
; sharded_workers is not used under strategy = dynamic; set to 0 (ignored).
;
; queue_capacity = 0 uses the engine default buffer size (1024). Larger values
; smooth bursts at the cost of memory and a longer tail during graceful stop.
;
; slow_submit_threshold = 0 uses the engine default (1m). Tune down to detect
; producer stalls faster in latency-sensitive scenarios.
[async_engine]
strategy              = dynamic   ; dynamic | sharded  (default: dynamic — the locked design)
max_queues            = 0         ; Dynamic only: live per-account queue cap (0 = unlimited)
idle_cleanup          = 5s        ; Dynamic only: idle per-account queue retire delay (0 = disabled)
sharded_workers       = 0         ; Sharded only: number of fixed shards (required > 0 when strategy = sharded)
queue_capacity        = 0         ; both: per-queue buffered channel size (0 = engine default 1024)
slow_submit_threshold = 0         ; both: slow-submit observer threshold (0 = engine default 1m)

[instruments]
symbols    = AAPL,SPX,MSFT,AMZN,GOOG,META,TSLA,NVDA,JPM,BAC
settlement = USD           ; cash/settlement asset (classic: USD)

[lifecycle]
p_open          = 0.40
p_add           = 0.15
p_partial_close = 0.25
p_full_close    = 0.20

[funding]
trigger = balance_below    ; top up when settlement available drops below amount
amount  = 100000           ; threshold; also the default seed + top-up size
seed    = 1000000          ; Absolute starting settlement balance per account
top_up  = 1000000          ; Delta added on each trigger

; Cohorts partition the account population. weight is the unnormalised share;
; size_weights is "qty:weight" buckets; symbol_skew is uniform | zipf.

[cohort.chatty]
weight            = 0.20    ; 20 % of accounts, high activity
activity          = 0.90    ; almost always acts when awake
reject_propensity = 0.70    ; absorbs most forced rejects
burst_len         = 4       ; orders fired per wake
size_weights      = 1:1,10:4,100:2
symbol_skew       = zipf    ; concentrate on the first few symbols
zipf_s            = 1.30

[cohort.steady]
weight            = 0.50    ; the bulk of accounts
activity          = 0.50
reject_propensity = 0.25
burst_len         = 2
size_weights      = 1:2,10:3,100:1
symbol_skew       = uniform

[cohort.dormant]
weight            = 0.30    ; rarely acts
activity          = 0.10
reject_propensity = 0.05
burst_len         = 1
size_weights      = 1:5,10:1
symbol_skew       = uniform
